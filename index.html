<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Crimzn Crypto Consult</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #111;
      color: #fff;
      padding: 20px;
    }

    h1, h2 {
      color: #f7931a;
    }

    #chat-form {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    #user-input {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 4px;
    }

    #chat-response {
      margin-top: 20px;
      background: #222;
      padding: 10px;
      border-radius: 6px;
    }

    button {
      background-color: #f7931a;
      border: none;
      padding: 8px 12px;
      border-radius: 4px;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Welcome to Crimzn Crypto Consult</h1>
  <p>Your one-stop page for crypto consulting powered by AI.</p>

  <section id="crimznbot">
    <h2>Talk to CrimznBot</h2>
    <form id="chat-form">
      <input type="text" id="user-input" placeholder="Ask anything..." required />
      <button type="submit">Send</button>
    </form>
    <div id="chat-response"></div>
  </section>

  <script>
    document.getElementById("chat-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const input = document.getElementById("user-input").value;
      const res = await fetch("https://crimznbot.onrender.com/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: input })
      });
      const data = await res.json();
      document.getElementById("chat-response").innerHTML = `<p><strong>CrimznBot:</strong> ${data.reply}</p>`;
      document.getElementById("user-input").value = "";
    });
  </script>
</body>
</html>
